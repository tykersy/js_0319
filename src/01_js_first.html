<!DOCTYPE html>
<html>
    <head>
        <script>
            document.write( "자바스크립트 안녕" );
            document.write("<br>");
            //자바스크립트의 자료형
            //var : 중복된 변수명을 허용
            //let : 중복된 변수가 있을경우 오류로 표시
            //const : 자바의 상수 개념으로 한번 넣은값에 대한 변경이 불가

            let str = '문자열';
            str = '변경';
            document.write(str+'<br>');

            const number = 100;
            //number = 150;
            
            let value = 100;
            value = true;

            let value2 = 3.14;

            // + 대신 ,로 변수를 이어 붙일 수 있다
            document.write(value +'&nbsp;&nbsp;', value2);
            

        </script>
    </head>
    <body>

    </body>
</html>
